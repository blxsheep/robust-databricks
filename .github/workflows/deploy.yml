name: Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Dry run (bundle validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Sync workspace Git folder
        run: |
          RAW=$(databricks workspace get-status \
            "/Workspace/Users/c.voranipit@gmail.com/robust-databricks" \
            --output json 2>/dev/null || true)
          REPO_ID=$(echo "$RAW" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          if raw:
              print(json.loads(raw).get('object_id', ''))
          " 2>/dev/null || true)
          if [[ -n "$REPO_ID" ]]; then
            databricks repos update "$REPO_ID" --branch main
            echo "Synced workspace Git folder to main (ID: $REPO_ID)"
          else
            echo "Warning: workspace Git folder not found. Create it once via Databricks UI: Workspace → Create → Git folder."
            exit 1
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
