resources:
  jobs:
    reliability_pipeline:
      name: "Reliability Pipeline — ${bundle.target}"

      # schema_version drives the sentinel scenario:
      #   v1 = baseline (production default)
      #   v2 = non-breaking change (adds delivery_partner column)
      #   v3 = breaking change (removes customer_id — pipeline halts at ingest_bronze)
      parameters:
        - name: schema_version
          default: v1

      # Email on failure — catches broken schemas, SLA misses, and infra errors at 3am.
      email_notifications:
        on_failure:
          - c.voranipit@gmail.com

      # Every 6 hours. Paused by default in dev; active in prod.
      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"
        timezone_id: UTC
        pause_status: PAUSED

      # ──────────────────────────────────────────────────────────────────────
      # Task graph:
      #
      #   generate_data
      #        │
      #   ingest_bronze   ← schema sentinel runs here; halts on BREAKING
      #        │
      #     dbt_run       ← silver + gold incremental models
      #        │
      #    sla_check      ← writes sla_check_log
      # ──────────────────────────────────────────────────────────────────────
      tasks:
        - task_key: generate_data
          description: "Generates 500 synthetic orders into reliability_engine.bronze.raw_orders"
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/generate_data
            source: WORKSPACE

        - task_key: ingest_bronze
          description: "Validates schema via sentinel, writes to bronze with metadata columns"
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/ingest_bronze
            source: WORKSPACE
            base_parameters:
              schema_version: "{{job.parameters.schema_version}}"

        - task_key: dbt_run
          description: "Runs incremental dbt models: silver.orders_cleaned and gold.daily_revenue"
          depends_on:
            - task_key: ingest_bronze
          environment_key: dbt_env
          dbt_task:
            project_directory: ${var.workspace_repo_path}/robust_etl_ecomm
            commands:
              - dbt run
            warehouse_id: ${var.warehouse_id}

        - task_key: sla_check
          description: "Runs freshness, completeness, and schema consistency checks → sla_check_log"
          depends_on:
            - task_key: dbt_run
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/sla_monitor
            source: WORKSPACE

      # Serverless Python environment for the dbt CLI task.
      # dbt-databricks must match the version pinned in pyproject.toml.
      environments:
        - environment_key: dbt_env
          spec:
            environment_version: "4"
            dependencies:
              - dbt-databricks>=1.9.0,<2.0.0
