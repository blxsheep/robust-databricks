resources:
  jobs:

    # ── Scenario 1: Baseline ──────────────────────────────────────────────
    # schema_v1 — all columns present, no change. Full pipeline runs clean.
    scenario_baseline:
      name: "Reliability Pipeline — Baseline"
      email_notifications:
        on_failure:
          - c.voranipit@gmail.com
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/generate_data
            source: WORKSPACE

        - task_key: ingest_bronze
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/ingest_bronze
            source: WORKSPACE
            base_parameters:
              schema_version: "v1"

        - task_key: dbt_run
          depends_on:
            - task_key: ingest_bronze
          environment_key: dbt_env
          dbt_task:
            project_directory: ${var.workspace_repo_path}/robust_etl_ecomm
            commands:
              - dbt run
            warehouse_id: ${var.warehouse_id}

        - task_key: sla_check
          depends_on:
            - task_key: dbt_run
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/sla_monitor
            source: WORKSPACE

      environments:
        - environment_key: dbt_env
          spec:
            environment_version: "4"
            dependencies:
              - dbt-databricks>=1.9.0,<2.0.0

    # ── Scenario 2: Non-Breaking Change ──────────────────────────────────
    # schema_v2 — adds delivery_partner. Sentinel logs NON_BREAKING, pipeline continues.
    scenario_non_breaking:
      name: "Reliability Pipeline — Non-Breaking"
      email_notifications:
        on_failure:
          - c.voranipit@gmail.com
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/generate_data
            source: WORKSPACE

        - task_key: ingest_bronze
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/ingest_bronze
            source: WORKSPACE
            base_parameters:
              schema_version: "v2"

        - task_key: dbt_run
          depends_on:
            - task_key: ingest_bronze
          environment_key: dbt_env
          dbt_task:
            project_directory: ${var.workspace_repo_path}/robust_etl_ecomm
            commands:
              - dbt run
            warehouse_id: ${var.warehouse_id}

        - task_key: sla_check
          depends_on:
            - task_key: dbt_run
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/sla_monitor
            source: WORKSPACE

      environments:
        - environment_key: dbt_env
          spec:
            environment_version: "4"
            dependencies:
              - dbt-databricks>=1.9.0,<2.0.0

    # ── Scenario 3: Breaking Change ───────────────────────────────────────
    # schema_v3 — removes customer_id. Sentinel halts at ingest_bronze.
    # dbt_run and sla_check are skipped (grey in the DAG) — zero rows written to Bronze.
    scenario_breaking:
      name: "Reliability Pipeline — Breaking"
      email_notifications:
        on_failure:
          - c.voranipit@gmail.com
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/generate_data
            source: WORKSPACE

        - task_key: ingest_bronze
          depends_on:
            - task_key: generate_data
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/ingest_bronze
            source: WORKSPACE
            base_parameters:
              schema_version: "v3"

        - task_key: dbt_run
          depends_on:
            - task_key: ingest_bronze
          environment_key: dbt_env
          dbt_task:
            project_directory: ${var.workspace_repo_path}/robust_etl_ecomm
            commands:
              - dbt run
            warehouse_id: ${var.warehouse_id}

        - task_key: sla_check
          depends_on:
            - task_key: dbt_run
          notebook_task:
            notebook_path: ${var.workspace_repo_path}/reliability_engine/scripts/sla_monitor
            source: WORKSPACE

      environments:
        - environment_key: dbt_env
          spec:
            environment_version: "4"
            dependencies:
              - dbt-databricks>=1.9.0,<2.0.0
