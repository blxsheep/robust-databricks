version: 2

models:
  - name: daily_revenue
    description: >
      Daily revenue aggregation. Incremental merge on order_date.
      Re-aggregates the most recent date on each run to capture late-arriving orders.
    columns:
      - name: order_date
        description: "Calendar date derived from created_at."
        tests: [not_null, unique]
      - name: total_orders
        description: "Count of distinct order_ids on this date."
        tests: [not_null]
      - name: gross_revenue
        description: "Sum of line_total for all orders on this date."
        tests: [not_null]
      - name: avg_order_value
        description: "Average line_total per order on this date."
        tests: [not_null]
      - name: delivered_orders
        description: "Count of orders with status = 'delivered'."
      - name: cancelled_orders
        description: "Count of orders with status = 'cancelled'."
